name: Update ticked hosts from firebog.net

on:
  push:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-firebog-hosts
  cancel-in-progress: true

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Update hosts blocklist
        shell: bash
        run: |
          set -euo pipefail

          tmp="$(mktemp)"
          commit_msg="$(mktemp)"

          {
            echo "Automatic hosts update"
            echo
            echo "Sources:"
          } > "$commit_msg"

          while IFS= read -r url; do
            [ -n "$url" ] || continue
            echo "  - '$url'" >> "$commit_msg"

            curl -fsSL "$url" | sed -E \
              -e 's/^(0\.0\.0\.0|127\.0\.0\.1|::1)[[:space:]]+//' \
              -e 's/[[:space:]]*#.*$//' \
              -e '/^localhost$/d' \
              -e '/^[[:space:]]*$/d' \
              >> "$tmp"
          done < <(curl -fsSL 'https://v.firebog.net/hosts/lists.php?type=tick')

          sort -u "$tmp" | sed 's/^/0.0.0.0 /' > firebog-ticked-hosts

          rm -f "$tmp"

          if git diff --quiet -- firebog-ticked-hosts; then
            echo "No changes detected."
            exit 0
          fi

          git config user.name github-actions
          git config user.email github-actions@github.com
          git add firebog-ticked-hosts
          git commit -F "$commit_msg"
          git push
